<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>TaskFlow</title>
    <!-- Single Page Apps for GitHub Pages (rafgraph/spa-github-pages, MIT).
         GitHub Pages serves this file for any unknown path; it rewrites the URL
         into a query string and redirects to index.html, where the snippet in
         <head> restores the original path for the client-side router.
         pathSegmentsToKeep = 1 keeps the project-page repo segment
         (/web-application/) intact. -->
    <script type="text/javascript">
      var pathSegmentsToKeep = 1;
      var l = window.location;
      l.replace(
        l.protocol +
          '//' +
          l.hostname +
          (l.port ? ':' + l.port : '') +
          l.pathname
            .split('/')
            .slice(0, 1 + pathSegmentsToKeep)
            .join('/') +
          '/?/' +
          l.pathname
            .slice(1)
            .split('/')
            .slice(pathSegmentsToKeep)
            .join('/')
            .replace(/&/g, '~and~') +
          (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
          l.hash,
      );
    </script>
  </head>
  <body></body>
</html>
